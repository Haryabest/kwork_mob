name: CI

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kwork
          POSTGRES_PASSWORD: kwork_secret
          POSTGRES_DB: kwork_mob
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U kwork"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ENVIRONMENT: development
      POSTGRES_HOST: localhost
      POSTGRES_PORT: '5432'
      POSTGRES_USER: kwork
      POSTGRES_PASSWORD: kwork_secret
      POSTGRES_DB: kwork_mob
      REDIS_URL: redis://localhost:6379/0
    defaults:
      run:
        working-directory: backend/orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app tests
      - name: OpenAPI spec up to date
        run: python scripts/export_openapi.py --check
      - name: Tests (pytest)
        run: pytest -q

  web-admin:
    name: web-admin (tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test

  web-seller:
    name: web-seller (tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-seller
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test

  mobile:
    name: Mobile (flutter analyze + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Generate localizations
        run: flutter gen-l10n
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - name: Unit tests
        run: flutter test

  mobile-backend-smoke:
    name: Mobile ↔ Backend smoke
    runs-on: ubuntu-latest
    needs: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kwork
          POSTGRES_PASSWORD: kwork_secret
          POSTGRES_DB: kwork_mob
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U kwork"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ENVIRONMENT: development
      POSTGRES_HOST: localhost
      POSTGRES_PORT: '5432'
      POSTGRES_USER: kwork
      POSTGRES_PASSWORD: kwork_secret
      POSTGRES_DB: kwork_mob
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Start API
        working-directory: backend/orchestrator
        run: |
          pip install -e ".[dev]"
          python scripts/init_ci_schema.py
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start"
          exit 1
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter integration smoke
        working-directory: apps/mobile
        run: |
          flutter pub get
          flutter test --dart-define=INTEGRATION_API=http://127.0.0.1:8000
