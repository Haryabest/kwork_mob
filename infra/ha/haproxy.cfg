global
    maxconn 256
    log stdout format raw local0

defaults
    log     global
    mode    tcp
    timeout connect 5s
    timeout client  30s
    timeout server  30s

# VIP PostgreSQL :5432 → Patroni primary (§22.3)
frontend postgres_vip
    bind *:5432
    default_backend postgres_patroni

backend postgres_patroni
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni-1 patroni-1:8008 check port 8008
    server postgres-primary postgres-primary:8008 check port 8008 backup
    server postgres-replica postgres-replica:8008 check port 8008 backup

# Patroni REST health на :8008 (опционально для мониторинга)
frontend patroni_rest
    bind *:8008
    mode http
    default_backend patroni_rest_nodes

backend patroni_rest_nodes
    mode http
    option httpchk GET /health
    server patroni-1 patroni-1:8008 check
    server postgres-primary postgres-primary:8008 check backup
