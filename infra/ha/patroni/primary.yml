# Patroni primary scaffold (§20). В prod — образ bitnami/patroni или patroni+postgres.
# Здесь конфиг-референс; compose поднимает postgres с WAL для streaming replica.
scope: kwork
name: postgres-primary
restapi:
  listen: 0.0.0.0:8008
  connect_address: postgres-primary:8008
etcd3:
  hosts: etcd:2379
bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    postgresql:
      use_pg_rewind: true
      parameters:
        wal_level: replica
        hot_standby: "on"
        max_wal_senders: 10
        max_replication_slots: 10
  initdb:
    - encoding: UTF8
    - locale: en_US.UTF-8
postgresql:
  listen: 0.0.0.0:5432
  connect_address: postgres-primary:5432
  data_dir: /var/lib/postgresql/data
  authentication:
    replication:
      username: replicator
      password: replicator_secret
    superuser:
      username: kwork
      password: kwork_secret
